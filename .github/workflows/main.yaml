name: DevOps Demo Day Pipeline

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_USER: kranio
  DOCKER_IMAGE_NAME: kranio/app-demoday:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build e Push da Imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Koyeb CLI
        uses: koyeb/action@v2
        with:
          api_key: ${{ secrets.KOYEB_TOKEN }}

      - name: Verificar e Implantar Serviço
        run: |
          if koyeb services get app-demoday > /dev/null 2>&1; then
            echo "Serviço encontrado. Atualizando..."
            koyeb services redeploy app-demoday
          else
            echo "Serviço não encontrado. Criando..."
            koyeb services create app-demoday \
              --image ${{ env.DOCKER_IMAGE_NAME }} \
              --instance-type nano \
              --ports 5000:http \
              --routes /:5000
          fi